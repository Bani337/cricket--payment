<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏏 Cricket Tournament Payment</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
}

h1 { margin-top: 20px; }

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.team {
  margin-top: 30px;
}

.card {
  background: white;
  color: black;
  padding: 12px;
  margin: 10px auto;
  width: 260px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

button {
  margin-top: 8px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #28a745;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

.paid {
  color: green;
  font-weight: bold;
}
</style>
</head>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<body>

<h1>🏏 Cricket Match Fee Payment</h1>
<p>AMBAGAN PREMIER LEAGUE</p>

<div class="container" id="players"></div>

<script>
const teams = [
  {
    captain: "Captain Gaurav",
    players: ["Gourav","Ayan","Don","Kausik","Anish Da","Sobuj","Rohan"]
  },
  {
    captain: "Captain Sunny",
    players: ["Sunny","Debu","Tanmoy","Shubam Da","Kodal","Arsha","Argha"]
  },
  {
    captain: "Captain Ravi Raj",
    players: ["Ravi","Ritabrata","Bunny","Surya","Sumon","Ritik Da","Lali"]
  }
];

// Load saved paid players
let paidPlayers = JSON.parse(localStorage.getItem("paidPlayers")) || [];

function render() {
  const container = document.getElementById("players");
  container.innerHTML = "";

  teams.forEach(team => {
    const teamDiv = document.createElement("div");
    teamDiv.className = "team";
    teamDiv.innerHTML = `<h2>${team.captain}</h2>`;

    team.players.forEach(player => {
      const paid = paidPlayers.includes(player);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div>${player}</div>
        ${paid ? '<div class="paid">✅ Paid</div>' : `<button onclick="payNow('${player}')">Pay ₹70</button>`}
      `;

      teamDiv.appendChild(card);
    });

    container.appendChild(teamDiv);
  });
}
async function payNow(name) {

  const res = await fetch("http://localhost:5000/create-order", {
    method: "POST"
  });

  const order = await res.json();

  const options = {
    key: "YOUR_KEY_ID",
    amount: order.amount,
    currency: "INR",
    name: "Cricket Tournament",
    description: "Match Fee",
    order_id: order.id,

    handler: function () {
      alert("✅ Payment Successful");

      if (!paidPlayers.includes(name)) {
        paidPlayers.push(name);
        localStorage.setItem("paidPlayers", JSON.stringify(paidPlayers));
      }

      render();
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}
