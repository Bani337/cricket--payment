<head>

    p.p2 {margin: 0.0px 0.0px 0.0px 0.0px; font: 12.0px Helvetica; -webkit-text-stroke: #000000; min-height: 14.0px}

<body>
  <h1>🏏 Cricket Match Fee Payment</h1>
  <p>Match Fee: ₹70 per player</p>

  <div class="container" id="players"></div>

<script>
const teams = [
  {
    captain: "Captain Gaurav",
    players: ["Ayan","Don","Kausik","Anish Da","Sobuj","Rohan"]
  },
  {
    captain: "Captain Sunny",
    players: ["Debu","Tanmoy","Shubam Da","Kodal","Arsha","Argha"]
  },
  {
    captain: "Captain Ravi Raj",
    players: ["Ritabrata","Bunny","Surya","Sumon","Ritik Da","Lali"]
  }
];

let paidPlayers = JSON.parse(localStorage.getItem('players')) || [];

function render() {
  const container = document.getElementById("players");
  container.innerHTML = "";

  teams.forEach(team => {
    container.innerHTML += `<h2>${team.captain}</h2>`;

    team.players.forEach(player => {
      const paid = paidPlayers.includes(player);

      container.innerHTML += `
        <div class="card">
          ${player}
          <br>
          ${paid 
            ? "✅ Paid" 
            : `<button onclick="payNow('${player}')">Pay ₹70</button>`}
        </div>
      `;
    });
  });
}

function payNow(name) {
  const upiLink = `upi://pay?pa=banibrata337-2@okaxis@upi&pn=CricketFee&am=70&cu=INR`;

  window.location.href = upiLink;

  if (!paidPlayers.includes(name)) {
    paidPlayers.push(name);
    localStorage.setItem('players', JSON.stringify(paidPlayers));
  }

  render();
}

render();
</script>
</body>
