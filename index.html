<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏏 Cricket Payment</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color: white;
  text-align: center;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin: 15px auto;
  width: 250px;
  border-radius: 10px;
}

button {
  padding: 8px 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
}

.paid { color: green; font-weight: bold; }
</style>
</head>

<body>

<h1>🏏 Cricket Match Fee</h1>
<p>AMBAGAN PREMIER LEAGUE</p>

<div id="players"></div>

<script>
const players = [
  "Gourav","Ayan","Don","Kausik","Anish","Sobuj","Rohan",
  "Sunny","Debu","Tanmoy","Shubam","Kodal","Arsha","Argha"
];

let paidPlayers = JSON.parse(localStorage.getItem("paid")) || [];

function render() {
  const container = document.getElementById("players");
  container.innerHTML = "";

  players.forEach(name => {
    const paid = paidPlayers.includes(name);

    container.innerHTML += `
      <div class="card">
        ${name}<br>
        ${paid ? '<span class="paid">✅ Paid</span>' : `<button onclick="pay('${name}')">Pay ₹70</button>`}
      </div>
    `;
  });
}

async function pay(name) {
  const res = await fetch("http://localhost:5000/create-order", {
    method: "POST"
  });

  const order = await res.json();

  const options = {
    key: "YOUR_KEY_ID",
    amount: order.amount,
    currency: "INR",
    name: "Cricket Tournament",
    description: "Match Fee",
    order_id: order.id,

    handler: function () {
      alert("✅ Payment Successful");

      if (!paidPlayers.includes(name)) {
        paidPlayers.push(name);
        localStorage.setItem("paid", JSON.stringify(paidPlayers));
      }

      render();
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

render();
</script>

</body>
</html>
